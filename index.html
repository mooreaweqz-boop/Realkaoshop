<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REALKAO SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}


.bg{
position:absolute;
width:700px;
height:700px;
background:conic-gradient(
#00eaff,
#8b5cff,
#ff0080,
#00eaff
);
filter:blur(180px);
opacity:.35;
animation:spin 10s linear infinite;
}


@keyframes spin{
100%{
transform:rotate(360deg);
}
}


.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:float linear infinite;
}


@keyframes float{

from{
transform:translateY(100vh);
opacity:0;
}

to{
transform:translateY(-100vh);
opacity:1;
}

}


.card{

width:400px;
padding:40px;

background:rgba(255,255,255,.07);

backdrop-filter:blur(25px);

border-radius:30px;

border:1px solid #333;

box-shadow:0 0 40px #00eaff;

z-index:5;

}


.logo{

text-align:center;

font-size:38px;

font-weight:bold;

background:linear-gradient(
90deg,
#00eaff,
#8b5cff
);

-webkit-background-clip:text;

color:transparent;

margin-bottom:10px;

}


.sub{

text-align:center;
color:#aaa;
margin-bottom:25px;

}


input{

width:100%;
padding:15px;

margin:8px 0;

background:#111;

border:1px solid #333;

border-radius:15px;

color:white;

outline:none;

}


input:focus{

border-color:#00eaff;

box-shadow:0 0 15px #00eaff;

}


button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:15px;

background:linear-gradient(
90deg,
#00eaff,
#8b5cff
);

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

}


button:hover{

transform:scale(1.04);

}


.page{

display:none;

}


.active{

display:block;

}


.switch{

text-align:center;

margin-top:20px;

color:#aaa;

}


.switch span{

color:#00eaff;

cursor:pointer;

}


#welcome{

text-align:center;

}


#welcome h1{

color:#00eaff;

text-shadow:0 0 20px #00eaff;

}


.logout{

background:#ff1744;

}


</style>

</head>


<body>


<div class="bg"></div>


<div class="card">


<!-- LOGIN -->

<div id="loginPage" class="page active">


<div class="logo">
REALKAO
</div>


<div class="sub">
SHOP SYSTEM
</div>


<input id="loginUsername" placeholder="👤 Username">


<input id="loginPassword" type="password" placeholder="🔒 Password">


<button onclick="loginUser()">
เข้าสู่ระบบ
</button>


<div class="switch">

ยังไม่มีบัญชี?

<span onclick="openRegister()">
สมัครสมาชิก
</span>

</div>


</div>




<!-- REGISTER -->


<div id="registerPage" class="page">


<div class="logo">
REGISTER
</div>


<div class="sub">
CREATE ACCOUNT
</div>


<input id="registerUsername" placeholder="👤 Username">


<input id="registerPassword" type="password" placeholder="🔒 Password">


<input id="confirmPassword" type="password" placeholder="🔐 ยืนยัน Password">


<button onclick="createAccount()">
สมัครสมาชิก
</button>


<div class="switch">

มีบัญชีแล้ว?

<span onclick="openLogin()">
เข้าสู่ระบบ
</span>

</div>


</div>





<!-- WELCOME -->


<div id="welcomePage" class="page">


<h1>
🎉 ยินดีต้อนรับ
</h1>


<h2>
เข้าสู่ร้าน
<br>
REALKAO SHOP
</h2>


<p id="usernameShow"></p>


<button class="logout" onclick="logoutUser()">
ออกจากระบบ
</button>


</div>


</div>




<script>


function openRegister(){

document.getElementById("loginPage")
.classList.remove("active");


document.getElementById("registerPage")
.classList.add("active");

}



function openLogin(){

document.getElementById("registerPage")
.classList.remove("active");


document.getElementById("loginPage")
.classList.add("active");

}




function createAccount(){

let user =
document.getElementById("registerUsername").value;


let pass =
document.getElementById("registerPassword").value;


let confirm =
document.getElementById("confirmPassword").value;



if(user=="" || pass=="" || confirm==""){

alert("กรุณากรอกข้อมูลให้ครบ");

return;

}



if(pass !== confirm){

alert("รหัสผ่านไม่ตรงกัน");

return;

}



localStorage.setItem("REALKAO_USER",user);

localStorage.setItem("REALKAO_PASS",pass);


alert("สมัครสมาชิกสำเร็จ");


openLogin();

}




function loginUser(){

let user =
document.getElementById("loginUsername").value;


let pass =
document.getElementById("loginPassword").value;



if(

user === localStorage.getItem("REALKAO_USER")

&&

pass === localStorage.getItem("REALKAO_PASS")

){


document.getElementById("loginPage")
.style.display="none";


document.getElementById("welcomePage")
.classList.add("active");


document.getElementById("usernameShow")
.innerHTML="👤 "+user;



}else{

alert("Username หรือ Password ไม่ถูกต้อง");

}

}




function logoutUser(){

location.reload();

}




for(let i=0;i<100;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.animationDuration=
(5+Math.random()*10)+"s";


document.body.appendChild(star);

}


</script>


</body>
</html>
