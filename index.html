<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REALKAO SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
}


/* background */

.bg{
position:fixed;
width:900px;
height:900px;
background:conic-gradient(
#00eaff,
#8b5cff,
#ff0066,
#00eaff
);
filter:blur(200px);
opacity:.25;
animation:spin 10s linear infinite;
}


@keyframes spin{
100%{
transform:rotate(360deg);
}
}



/* menu */

.menu-btn{

position:fixed;
top:20px;
left:20px;
font-size:35px;
cursor:pointer;
z-index:100;
color:#00eaff;

}



#sideMenu{

position:fixed;
left:-260px;
top:0;
height:100%;
width:250px;

background:#111;

padding-top:80px;

transition:.4s;

z-index:99;

box-shadow:0 0 30px #00eaff;

}


#sideMenu.active{

left:0;

}


#sideMenu div{

padding:20px;

border-bottom:1px solid #333;

cursor:pointer;

}



#sideMenu div:hover{

color:#00eaff;

}




/* card */

.card{

width:420px;

padding:40px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border-radius:30px;

border:1px solid #333;

box-shadow:0 0 40px #00eaff;

z-index:5;

}



.logo{

text-align:center;

font-size:40px;

font-weight:bold;

color:#00eaff;

text-shadow:0 0 20px #00eaff;

}



.sub{

text-align:center;

color:#aaa;

margin-bottom:25px;

}



input{

width:100%;

padding:15px;

margin:8px 0;

background:#080808;

border:1px solid #333;

border-radius:15px;

color:white;

}



button{

width:100%;

padding:15px;

margin-top:15px;

border:0;

border-radius:15px;

background:linear-gradient(
90deg,
#00eaff,
#8b5cff
);

color:white;

font-size:16px;

cursor:pointer;

}



.page{

display:none;

}


.active{

display:block;

}


.switch{

text-align:center;

margin-top:20px;

}


.switch span{

color:#00eaff;

cursor:pointer;

}


</style>

</head>


<body>


<div class="bg"></div>


<div class="menu-btn" onclick="toggleMenu()">
☰
</div>


<div id="sideMenu">

<div onclick="openShop()">
🛒 สินค้าทั้งหมด
</div>

<div onclick="openTopup()">
💰 เติมเงิน
</div>

<div onclick="openHistory()">
📜 ประวัติการซื้อ
</div>

</div>



<div class="card">


<!-- LOGIN -->

<div id="loginPage" class="page active">


<div class="logo">
REALKAO
</div>


<div class="sub">
SHOP SYSTEM
</div>


<input id="loginUser" placeholder="👤 Username">


<input id="loginPass" type="password" placeholder="🔒 Password">


<button onclick="login()">
เข้าสู่ระบบ
</button>


<div class="switch">
ยังไม่มีบัญชี?
<span onclick="openRegister()">
สมัครสมาชิก
</span>
</div>


</div>




<!-- REGISTER -->


<div id="registerPage" class="page">


<div class="logo">
REGISTER
</div>


<input id="regUser" placeholder="👤 Username">


<input id="regPass" type="password" placeholder="🔒 Password">


<input id="regConfirm" type="password" placeholder="🔐 ยืนยัน Password">


<button onclick="register()">
สมัครสมาชิก
</button>


<div class="switch">
มีบัญชีแล้ว?
<span onclick="openLogin()">
เข้าสู่ระบบ
</span>
</div>


</div>
